<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spy Agency: Mainframe Hacker</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Load Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Spy Font -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #050505;
            background-image: 
                linear-gradient(rgba(0, 255, 170, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 170, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #00ffaa;
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            min-height: 100vh;
        }
        .glitch-text {
            text-shadow: 2px 0 #ff3366, -2px 0 #33ccff;
            animation: glitch 2s infinite linear alternate-reverse;
        }
        @keyframes glitch {
            0% { text-shadow: 2px 0 #ff3366, -2px 0 #33ccff; }
            5% { text-shadow: -2px 0 #ff3366, 2px 0 #33ccff; }
            10% { text-shadow: 2px 0 #ff3366, -2px 0 #33ccff; }
            15% { text-shadow: -2px 0 #ff3366, 2px 0 #33ccff; }
            20% { text-shadow: 2px 0 #ff3366, -2px 0 #33ccff; }
            100% { text-shadow: 2px 0 #ff3366, -2px 0 #33ccff; }
        }
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 9999;
            position: absolute;
            pointer-events: none;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(0,255,170,0.1) 50%, rgba(0,0,0,0) 100%);
            animation: scan 4s linear infinite;
        }
        @keyframes scan {
            0% { top: -100px; }
            100% { top: 100vh; }
        }
        .crt-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 9998;
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="crt-overlay"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- THE REWARDS: SPY GADGETS ---
        const GADGETS = [
            { name: "Laser Pen", desc: "Can cut through solid steel doors.", icon: "🖊️" },
            { name: "X-Ray Specs", desc: "Allows the agent to see through walls.", icon: "🕶️" },
            { name: "EMP Watch", desc: "Disables all electronics in a 50ft radius.", icon: "⌚" },
            { name: "Hover Boots", desc: "Silences footsteps and allows brief levitation.", icon: "👢" }
        ];

        // --- THE MISSIONS: SECTION 3 GRAMMAR ---
        const SERVERS = [
            {
                id: "cause",
                title: "Server 1: Cause & Effect",
                icon: "🔗",
                questions: [
                    { q: "The guards were sleeping; ________, I sneaked past them.", options: ["because", "consequently", "but"], correct: 1 },
                    { q: "Which word is a Subordinating Conjunction?", options: ["Because", "And", "Or"], correct: 0 },
                    { q: "I dropped my radio ________ my hands were slippery.", options: ["therefore", "since", "so"], correct: 1 },
                    { q: "The mission failed ________ of the bad weather.", options: ["as a result", "consequently", "although"], correct: 0 }
                ]
            },
            {
                id: "interrogation",
                title: "Server 2: Interrogation",
                icon: "🕵️",
                questions: [
                    { q: "Add a question tag: You hid the diamond, ________?", options: ["did you", "didn't you", "don't you"], correct: 1 },
                    { q: "Turn this NEGATIVE: The vault is open.", options: ["The vault is closed.", "The vault is not open.", "Is the vault open?"], correct: 1 },
                    { q: "Add a question tag: The laser is off, ________?", options: ["isn't it", "is it", "does it"], correct: 0 },
                    { q: "Which sentence is a negative?", options: ["Nobody saw the spy.", "Everyone saw the spy.", "The spy ran away."], correct: 0 }
                ]
            },
            {
                id: "paragraphs",
                title: "Server 3: Mission Reports",
                icon: "📄",
                questions: [
                    { q: "In a NON-FICTION gadget report, paragraphs are sorted by:", options: ["Action", "Topic", "Dialogue"], correct: 1 },
                    { q: "In a FICTION spy story, when do you start a new paragraph?", options: ["When someone new speaks", "Every 5 sentences", "At the end of the page"], correct: 0 },
                    { q: "What should you use to organize paragraphs in a non-fiction report?", options: ["Speech marks", "Subheadings", "Question marks"], correct: 1 },
                    { q: "TiP ToP Rule: What does the first 'P' stand for?", options: ["Person", "Place", "Paragraph"], correct: 1 }
                ]
            },
            {
                id: "morphology",
                title: "Server 4: Gadget Upgrades",
                icon: "🛠️",
                questions: [
                    { q: "Upgrade the noun 'poison' to an adjective:", options: ["Poisoned", "Poisonous", "Poisonly"], correct: 1 },
                    { q: "Which word belongs to the same Word Family as 'sign'?", options: ["Sing", "Signature", "Sight"], correct: 1 },
                    { q: "Upgrade the noun 'danger' to an adjective:", options: ["Dangerous", "Dangerly", "Endanger"], correct: 0 },
                    { q: "What suffix turns 'care' into an adjective meaning 'without care'?", options: ["-ful", "-less", "-ness"], correct: 1 }
                ]
            }
        ];

        function App() {
            const [gameState, setGameState] = useState('menu'); // menu, hacking, reward
            const [dataFragments, setDataFragments] = useState(0);
            const [unlockedGadgets, setUnlockedGadgets] = useState([]);
            const [activeServer, setActiveServer] = useState(null);
            const [qIndex, setQIndex] = useState(0);
            const [feedback, setFeedback] = useState(null);

            const startHack = (serverIndex) => {
                setActiveServer(SERVERS[serverIndex]);
                setQIndex(0);
                setFeedback(null);
                setGameState('hacking');
            };

            const handleAnswer = (optIndex) => {
                if (feedback !== null) return;

                const isCorrect = optIndex === activeServer.questions[qIndex].correct;
                setFeedback(isCorrect ? 'ACCESS GRANTED' : 'ACCESS DENIED');

                if (isCorrect) {
                    const newFrags = dataFragments + 1;
                    setDataFragments(newFrags);
                    
                    setTimeout(() => {
                        setFeedback(null);
                        // Reward every 4 fragments
                        if (newFrags % 4 === 0 && unlockedGadgets.length < GADGETS.length) {
                            setGameState('reward');
                        } else {
                            nextQuestion();
                        }
                    }, 1200);
                } else {
                    setTimeout(() => {
                        setFeedback(null);
                        nextQuestion();
                    }, 2000);
                }
            };

            const nextQuestion = () => {
                if (qIndex + 1 < activeServer.questions.length) {
                    setQIndex(qIndex + 1);
                } else {
                    setGameState('menu'); 
                }
            };

            const unlockGadget = () => {
                const gadget = GADGETS[unlockedGadgets.length];
                setUnlockedGadgets([...unlockedGadgets, gadget]);
                if (qIndex + 1 < activeServer.questions.length) {
                    nextQuestion();
                    setGameState('hacking');
                } else {
                    setGameState('menu');
                }
            };

            // --- MENU UI ---
            if (gameState === 'menu') {
                return (
                    <div className="flex flex-col items-center justify-center p-8 z-10 relative">
                        <div className="text-center mb-12">
                            <h1 className="text-6xl font-bold mb-4 glitch-text">MAINFRAME OVERRIDE</h1>
                            <p className="text-xl text-[#33ccff] mb-6">> DECRYPT SERVERS TO UNLOCK GADGETS_</p>
                            
                            <div className="flex justify-center gap-8 items-center bg-[#0a0a0a] p-4 rounded border border-[#00ffaa]">
                                <div className="text-2xl">
                                    DATA FRAGMENTS: <span className="text-white">{dataFragments}</span>
                                </div>
                                <div className="h-8 w-px bg-[#00ffaa]"></div>
                                <div className="text-2xl text-[#ff3366]">
                                    GADGETS SECURED: {unlockedGadgets.length}/4
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl w-full">
                            {SERVERS.map((server, idx) => (
                                <button 
                                    key={idx}
                                    onClick={() => startHack(idx)}
                                    className="bg-[#0a0a0a] p-6 border-2 border-[#33ccff] hover:bg-[#00ffaa] hover:text-black transition-all text-left flex items-center gap-6 group"
                                >
                                    <div className="text-5xl">{server.icon}</div>
                                    <div>
                                        <h2 className="text-2xl font-bold mb-1">{server.title}</h2>
                                        <p className="text-sm opacity-80 group-hover:text-black">> INITIATE HACK_</p>
                                    </div>
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            // --- HACKING UI ---
            if (gameState === 'hacking') {
                const currentQ = activeServer.questions[qIndex];
                
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 z-10 relative">
                        <div className="w-full max-w-3xl flex justify-between items-center mb-8 border-b border-[#00ffaa] pb-4">
                            <button onClick={() => setGameState('menu')} className="text-[#ff3366] hover:text-white">[ ABORT MISSION ]</button>
                            <div className="text-xl">NODE {qIndex + 1} / {activeServer.questions.length}</div>
                        </div>

                        <div className="bg-[#0a0a0a] p-10 border border-[#00ffaa] w-full max-w-3xl text-center shadow-[0_0_30px_rgba(0,255,170,0.2)]">
                            {!feedback ? (
                                <div>
                                    <div className="text-[#33ccff] mb-4">> DECRYPTION REQUIRED_</div>
                                    <h2 className="text-3xl text-white mb-10">{currentQ.q}</h2>
                                    <div className="flex flex-col gap-4">
                                        {currentQ.options.map((opt, i) => (
                                            <button 
                                                key={i}
                                                onClick={() => handleAnswer(i)}
                                                className="bg-transparent hover:bg-[#00ffaa] hover:text-black border border-[#00ffaa] text-xl py-4 px-6 transition-colors uppercase"
                                            >
                                                > {opt}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <div className="py-12">
                                    <h2 className={`text-5xl font-bold mb-4 ${feedback === 'ACCESS GRANTED' ? 'text-[#00ffaa]' : 'text-[#ff3366] glitch-text'}`}>
                                        [{feedback}]
                                    </h2>
                                    {feedback === 'ACCESS DENIED' && (
                                        <p className="text-xl text-white mt-4">CORRECT OVERRIDE CODE: <br/> <span className="text-[#00ffaa]">> {currentQ.options[currentQ.correct]}</span></p>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            // --- REWARD UI ---
            if (gameState === 'reward') {
                const gadget = GADGETS[unlockedGadgets.length];
                
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 z-10 relative bg-black/80">
                        <div className="text-center">
                            <h1 className="text-5xl text-[#33ccff] mb-8">> NEW GADGET AUTHORIZED</h1>
                            
                            <div className="bg-[#0a0a0a] p-10 border-2 border-[#33ccff] shadow-[0_0_50px_rgba(51,204,255,0.4)] max-w-xl mx-auto">
                                <div className="text-8xl mb-6">{gadget.icon}</div>
                                <h2 className="text-4xl text-white mb-4 uppercase">{gadget.name}</h2>
                                <p className="text-xl text-[#00ffaa] mb-8">"{gadget.desc}"</p>

                                <button 
                                    onClick={unlockGadget}
                                    className="w-full bg-[#33ccff] text-black font-bold text-2xl py-4 hover:bg-white transition-colors"
                                >
                                    > EQUIP GADGET
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
