<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCSE Computer Science - Python IDE</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --green: #00c853;
    --green-bg: #0a3d1a;
    --text: #e0e0e0;
    --text-dim: #8892a4;
    --border: #2a3a5c;
    --editor-bg: #0d1117;
    --yellow: #ffd600;
    --orange: #ff9100;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header h1 {
    font-size: 1.3rem;
    font-weight: 600;
  }

  .header h1 span { color: var(--accent); }

  .progress-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
    color: var(--text-dim);
  }

  .progress-bar .bar {
    width: 200px;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-bar .bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .layout {
    display: flex;
    height: calc(100vh - 60px);
  }

  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
  }

  .sidebar h2 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    padding: 8px 16px;
    margin-bottom: 4px;
  }

  .q-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 10px 16px;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 0.85rem;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s;
  }

  .q-btn:hover { background: rgba(255,255,255,0.05); }
  .q-btn.active { background: var(--surface2); border-left: 3px solid var(--accent); }

  .q-btn .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid var(--text-dim);
    flex-shrink: 0;
    transition: all 0.3s;
  }

  .q-btn .dot.solved {
    background: var(--green);
    border-color: var(--green);
    box-shadow: 0 0 6px rgba(0,200,83,0.4);
  }

  .q-btn .q-label {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .question-panel {
    padding: 20px 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    max-height: 40%;
    overflow-y: auto;
    transition: background 0.5s;
  }

  .question-panel.solved {
    background: var(--green-bg);
    border-bottom-color: var(--green);
  }

  .question-panel .q-number {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .question-panel.solved .q-number { color: var(--green); }

  .question-panel .q-title {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .question-panel .q-body {
    font-size: 0.9rem;
    line-height: 1.65;
    color: var(--text-dim);
  }

  .question-panel .q-body code {
    background: var(--editor-bg);
    padding: 2px 6px;
    border-radius: 3px;
    font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 0.85em;
    color: var(--yellow);
  }

  .question-panel .q-body pre {
    background: var(--editor-bg);
    padding: 12px 16px;
    border-radius: 6px;
    margin: 10px 0;
    overflow-x: auto;
    font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 0.85em;
    line-height: 1.5;
    color: var(--yellow);
  }

  .question-panel .q-body table {
    border-collapse: collapse;
    margin: 10px 0;
    font-size: 0.85rem;
  }

  .question-panel .q-body table th,
  .question-panel .q-body table td {
    border: 1px solid var(--border);
    padding: 6px 14px;
    text-align: left;
  }

  .question-panel .q-body table th {
    background: var(--surface2);
    font-weight: 600;
  }

  .question-panel .solved-badge {
    display: none;
    align-items: center;
    gap: 6px;
    font-size: 0.8rem;
    color: var(--green);
    font-weight: 600;
    margin-top: 10px;
  }

  .question-panel.solved .solved-badge { display: flex; }

  .editor-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .editor-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--editor-bg);
    border-bottom: 1px solid var(--border);
  }

  .editor-toolbar .file-tab {
    font-size: 0.8rem;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .editor-toolbar .file-tab .py-icon {
    color: var(--yellow);
    font-weight: bold;
  }

  .btn {
    padding: 7px 18px;
    border: none;
    border-radius: 4px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-run {
    background: var(--green);
    color: #000;
  }

  .btn-run:hover { background: #00e676; }
  .btn-run:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-reset {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    margin-right: 8px;
  }

  .btn-reset:hover { border-color: var(--text); color: var(--text); }

  .editor-wrapper {
    flex: 1;
    position: relative;
    min-height: 0;
  }

  .editor-wrapper textarea {
    width: 100%;
    height: 100%;
    background: var(--editor-bg);
    color: var(--text);
    border: none;
    padding: 16px;
    font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 0.9rem;
    line-height: 1.6;
    resize: none;
    outline: none;
    tab-size: 4;
  }

  .output-panel {
    height: 140px;
    min-height: 100px;
    background: #000;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 16px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
  }

  .output-content {
    flex: 1;
    padding: 10px 16px;
    font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 0.85rem;
    overflow-y: auto;
    white-space: pre-wrap;
    line-height: 1.5;
  }

  .output-content.error { color: var(--accent); }
  .output-content.success { color: var(--green); }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    gap: 16px;
  }

  .loading-overlay.hidden { display: none; }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-overlay p {
    color: var(--text-dim);
    font-size: 0.9rem;
  }

  .hint-box {
    margin-top: 10px;
    padding: 10px 14px;
    background: rgba(255, 214, 0, 0.08);
    border-left: 3px solid var(--yellow);
    border-radius: 4px;
    font-size: 0.82rem;
    color: var(--yellow);
    display: none;
  }

  .input-prompt-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }

  .input-prompt-overlay.hidden { display: none; }

  .input-prompt-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    width: 380px;
    max-width: 90%;
  }

  .input-prompt-box h3 {
    font-size: 0.95rem;
    margin-bottom: 6px;
  }

  .input-prompt-box p {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  .input-prompt-box input {
    width: 100%;
    padding: 8px 12px;
    background: var(--editor-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
    margin-bottom: 12px;
  }

  .input-prompt-box input:focus { border-color: var(--accent); }

  .input-prompt-box .btn-submit-input {
    background: var(--accent);
    color: #fff;
    width: 100%;
  }

  .non-code-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .non-code-answer {
    flex: 1;
    padding: 20px 28px;
    overflow-y: auto;
  }

  .non-code-answer label {
    display: block;
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 6px;
    margin-top: 14px;
  }

  .non-code-answer label:first-child { margin-top: 0; }

  .non-code-answer input[type="text"],
  .non-code-answer textarea {
    width: 100%;
    padding: 8px 12px;
    background: var(--editor-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 0.9rem;
    outline: none;
  }

  .non-code-answer input[type="text"]:focus,
  .non-code-answer textarea:focus { border-color: var(--accent); }

  .non-code-answer textarea {
    min-height: 80px;
    resize: vertical;
  }

  .non-code-answer .btn-check {
    margin-top: 16px;
    background: var(--accent);
    color: #fff;
  }

  .non-code-answer .btn-check:hover { background: #ff2d4f; }

  .feedback-msg {
    margin-top: 10px;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 0.85rem;
    display: none;
  }

  .feedback-msg.correct {
    background: rgba(0,200,83,0.1);
    color: var(--green);
    border: 1px solid rgba(0,200,83,0.3);
    display: block;
  }

  .feedback-msg.incorrect {
    background: rgba(233,69,96,0.1);
    color: var(--accent);
    border: 1px solid rgba(233,69,96,0.3);
    display: block;
  }

  @media (max-width: 800px) {
    .sidebar { display: none; }
    .layout { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p>Loading Python environment (Pyodide)...</p>
</div>

<div class="input-prompt-overlay hidden" id="inputOverlay">
  <div class="input-prompt-box">
    <h3>Program needs input</h3>
    <p id="inputLabel">Enter value:</p>
    <input type="text" id="inputField" autocomplete="off">
    <button class="btn btn-submit-input" id="inputSubmit">Submit</button>
  </div>
</div>

<div class="header">
  <h1><span>GCSE</span> Computer Science &mdash; Python IDE</h1>
  <div class="progress-bar">
    <span id="progressText">0 / 20 solved</span>
    <div class="bar"><div class="bar-fill" id="progressFill" style="width:0%"></div></div>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <h2>Questions</h2>
  </div>

  <div class="main" id="mainArea">
    <div class="question-panel" id="questionPanel">
      <div class="q-number" id="qNumber"></div>
      <div class="q-title" id="qTitle"></div>
      <div class="q-body" id="qBody"></div>
      <div class="hint-box" id="hintBox"></div>
      <div class="solved-badge">&#10003; Correct - Question Solved!</div>
    </div>

    <div class="editor-area" id="editorArea">
      <div class="editor-toolbar">
        <div class="file-tab"><span class="py-icon">PY</span> solution.py</div>
        <div>
          <button class="btn btn-reset" onclick="resetCode()">Reset</button>
          <button class="btn btn-run" id="runBtn" onclick="runCode()">&#9654; Run</button>
        </div>
      </div>
      <div class="editor-wrapper">
        <textarea id="codeEditor" spellcheck="false" placeholder="# Write your Python code here..."></textarea>
      </div>
      <div class="output-panel">
        <div class="output-header">
          <span>Output</span>
          <span id="outputStatus"></span>
        </div>
        <div class="output-content" id="outputContent">Click "Run" to execute your code.</div>
      </div>
    </div>

    <div class="non-code-panel" id="nonCodePanel" style="display:none">
    </div>
  </div>
</div>

<script>
const QUESTIONS = [
  {
    id: 1,
    title: "Username Generator",
    type: "code",
    body: `A school wants to create usernames using this rule: <strong>Initial + First 3 letters of last name + year</strong>.<br><br>
Example: David Hamilton, 2024 &rarr; <code>DHam2024</code><br><br>
The algorithm has been started:<pre>FName = input("Enter first name")
LName = input("Enter last name")
year = input("Enter year")
username = ???
print(username)</pre>
Complete the program so it correctly creates and prints the username using string manipulation.`,
    starter: `FName = input("Enter first name: ")\nLName = input("Enter last name: ")\nyear = input("Enter year: ")\nusername = \nprint(username)`,
    tests: [
      { inputs: ["David", "Hamilton", "2024"], expected: "DHam2024" },
      { inputs: ["Sarah", "Jones", "2023"], expected: "SJon2023" },
      { inputs: ["Alice", "Brown", "2025"], expected: "ABro2025" }
    ],
    hint: "Use indexing like FName[0] for the initial, LName[0:3] for first 3 letters, and concatenate with +"
  },
  {
    id: 2,
    title: "Library Book Logger",
    type: "code",
    body: `Write an algorithm that:<br>
<ul>
<li>Inputs the title and year of a book from the user</li>
<li>Permanently stores the book title and year to a text file named <code>books.txt</code></li>
<li>Closes the file</li>
</ul>
<em>Note: In this environment, file operations are simulated. Your code should use <code>open()</code>, <code>.write()</code>, and <code>.close()</code> with append mode <code>"a"</code>.</em>`,
    starter: `title = input("Enter book title: ")\nyear = input("Enter year: ")\n`,
    tests: [
      {
        inputs: ["Harry Potter", "1997"],
        validator: "file_write",
        checkFile: "books.txt",
        checkContains: ["Harry Potter", "1997"]
      }
    ],
    hint: 'Use open("books.txt", "a") to open in append mode, then .write() and .close()'
  },
  {
    id: 3,
    title: "SQL Query - Stock Table",
    type: "noncode",
    body: `The database table <strong>Stock</strong> stores product information:<br>
<table>
<tr><th>ProdName</th><th>Quantity</th><th>Price</th></tr>
<tr><td>Biscuits</td><td>143</td><td>0.99</td></tr>
<tr><td>Bread</td><td>87</td><td>1.49</td></tr>
<tr><td>Milk</td><td>34</td><td>1.10</td></tr>
<tr><td>Pasta</td><td>421</td><td>0.89</td></tr>
</table><br>
Complete the SQL query to return the product name and quantity of all products where the price is less than &pound;1.`,
    fields: [
      { label: "SELECT", key: "select", placeholder: "e.g. ProdName, Quantity" },
      { label: "FROM", key: "from", placeholder: "e.g. Stock" },
      { label: "WHERE", key: "where", placeholder: "e.g. Price < 1" }
    ],
    validator: function(answers) {
      const s = answers.select.replace(/\s+/g,'').toLowerCase();
      const f = answers.from.replace(/\s+/g,'').toLowerCase();
      const w = answers.where.replace(/\s+/g,'').toLowerCase();
      const selectOk = (s.includes('prodname') && s.includes('quantity'));
      const fromOk = (f === 'stock');
      const whereOk = (w.includes('price') && (w.includes('<1') || w.includes('< 1') || w.includes('<1.00') || w.includes('< 1.00')));
      return selectOk && fromOk && whereOk;
    },
    hint: "SELECT needs two columns separated by comma. WHERE uses < operator."
  },
  {
    id: 4,
    title: "Flight Cost Function",
    type: "code",
    body: `Economy ticket = &pound;199. First-class = &pound;595.<br><br>
Create a function <code>flightCost()</code> that takes the <strong>number of passengers</strong> and the <strong>type of ticket</strong> ("economy" or "first") as parameters, calculates and <strong>returns</strong> the total price.`,
    starter: `def flightCost(passengers, ticketType):\n    \n`,
    tests: [
      { call: "print(flightCost(3, 'economy'))", expected: "597" },
      { call: "print(flightCost(2, 'first'))", expected: "1190" },
      { call: "print(flightCost(1, 'economy'))", expected: "199" },
      { call: "print(flightCost(1, 'first'))", expected: "595" }
    ],
    hint: 'Use if/elif to check ticketType and multiply by the correct price'
  },
  {
    id: 5,
    title: "Car Dealership Validator",
    type: "code",
    body: `A car dealership only sells cars with <strong>fewer than 15,000 miles</strong> and <strong>10 years old or less</strong>.<br><br>
Write an algorithm that:
<ul>
<li>Asks the user to enter the number of miles and the age of a car</li>
<li>Validates both values are &ge; 0 and within the upper limits</li>
<li>Outputs <code>True</code> if valid or <code>False</code> if invalid</li>
</ul>`,
    starter: `miles = int(input("Enter miles: "))\nage = int(input("Enter age: "))\n`,
    tests: [
      { inputs: ["10000", "5"], expected: "True" },
      { inputs: ["15000", "5"], expected: "False" },
      { inputs: ["14999", "10"], expected: "True" },
      { inputs: ["10000", "11"], expected: "False" },
      { inputs: ["-1", "5"], expected: "False" },
      { inputs: ["5000", "-1"], expected: "False" },
      { inputs: ["0", "0"], expected: "True" }
    ],
    hint: "Check: miles >= 0 AND miles < 15000 AND age >= 0 AND age <= 10"
  },
  {
    id: 6,
    title: "2D Array - TV Minutes",
    type: "code",
    body: `TV watching minutes are stored in a 2D array <code>minsWatched</code>.<br>
Columns: 0=Quinn, 1=Lyla, 2=Harry, 3=Elias<br>
Rows: 0=Monday, 1=Tuesday, 2=Wednesday, 3=Thursday, 4=Friday<br><br>
Write a line of code to output the minutes Harry watched TV on Friday.<br><br>
<em>The array is pre-loaded for you. Just write the print statement.</em>`,
    starter: `minsWatched = [\n    [30, 45, 60, 20],\n    [25, 50, 40, 35],\n    [15, 30, 55, 45],\n    [40, 20, 35, 50],\n    [60, 45, 70, 30]\n]\n`,
    tests: [
      { inputs: [], expected: "70" }
    ],
    hint: "Harry is column index 2, Friday is row index 4: minsWatched[4][2]"
  },
  {
    id: 7,
    title: "Trace Table",
    type: "noncode",
    body: `Trace the following program:<pre>01 x = 15
02 y = 0
03 while x > 0
04   y = y + 1
05   x = x - y
06 endwhile
07 print(y)</pre>
Complete the trace table showing the values of x and y after each iteration, and the final output.`,
    fields: [
      { label: "After iteration 1: x =", key: "x1", placeholder: "value of x" },
      { label: "After iteration 1: y =", key: "y1", placeholder: "value of y" },
      { label: "After iteration 2: x =", key: "x2", placeholder: "value of x" },
      { label: "After iteration 2: y =", key: "y2", placeholder: "value of y" },
      { label: "After iteration 3: x =", key: "x3", placeholder: "value of x" },
      { label: "After iteration 3: y =", key: "y3", placeholder: "value of y" },
      { label: "After iteration 4: x =", key: "x4", placeholder: "value of x" },
      { label: "After iteration 4: y =", key: "y4", placeholder: "value of y" },
      { label: "After iteration 5: x =", key: "x5", placeholder: "value of x" },
      { label: "After iteration 5: y =", key: "y5", placeholder: "value of y" },
      { label: "Final output (print y):", key: "output", placeholder: "output" }
    ],
    validator: function(a) {
      return a.x1==="14" && a.y1==="1" &&
             a.x2==="12" && a.y2==="2" &&
             a.x3==="9" && a.y3==="3" &&
             a.x4==="5" && a.y4==="4" &&
             a.x5==="0" && a.y5==="5" &&
             a.output==="5";
    },
    hint: "Each loop: y goes up by 1, then x = x - y. Loop stops when x <= 0."
  },
  {
    id: 8,
    title: "Flowchart to Code",
    type: "code",
    body: `Convert this flowchart logic to Python code:<br><br>
<strong>Input:</strong> Enter price of item<br>
<strong>Decision:</strong> Is Price &lt; 50?<br>
&nbsp;&nbsp;If Yes: Output "Great choice!"<br>
&nbsp;&nbsp;If No: Output "Way too expensive"`,
    starter: ``,
    tests: [
      { inputs: ["30"], expected: "Great choice!" },
      { inputs: ["49"], expected: "Great choice!" },
      { inputs: ["50"], expected: "Way too expensive" },
      { inputs: ["100"], expected: "Way too expensive" }
    ],
    hint: 'Use input() to get the price, int() or float() to cast it, then if/else'
  },
  {
    id: 9,
    title: "Short ID Generator",
    type: "code",

let currentQ = 0;
let solved = new Set();
let pyodide = null;
let inputResolve = null;
let savedCode = {};
let failCounts = {};

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<h2>Questions</h2>';
  QUESTIONS.forEach((q, i) => {
    const btn = document.createElement('button');
    btn.className = 'q-btn' + (i === currentQ ? ' active' : '');
    btn.id = 'qbtn-' + i;
    btn.innerHTML = `<span class="dot ${solved.has(i) ? 'solved' : ''}" id="dot-${i}"></span><span class="q-label">Q${q.id}. ${q.title}</span>`;
    btn.onclick = () => selectQuestion(i);
    sb.appendChild(btn);
  });
}

function selectQuestion(idx) {
  if (currentQ === idx) return;
  const ed = document.getElementById('codeEditor');
  if (QUESTIONS[currentQ].type === 'code') {
    savedCode[currentQ] = ed.value;
  }
  currentQ = idx;
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const panel = document.getElementById('questionPanel');
  const editorArea = document.getElementById('editorArea');
  const nonCodePanel = document.getElementById('nonCodePanel');

  document.getElementById('qNumber').textContent = `Question ${q.id} of 20`;
  document.getElementById('qTitle').textContent = q.title;
  document.getElementById('qBody').innerHTML = q.body;

  panel.className = 'question-panel' + (solved.has(currentQ) ? ' solved' : '');

  const hintBox = document.getElementById('hintBox');
  hintBox.style.display = 'none';
  hintBox.textContent = '';

  document.querySelectorAll('.q-btn').forEach((b, i) => {
    b.className = 'q-btn' + (i === currentQ ? ' active' : '');
  });

  if (q.type === 'code') {
    editorArea.style.display = 'flex';
    nonCodePanel.style.display = 'none';
    const ed = document.getElementById('codeEditor');
    ed.value = savedCode[currentQ] !== undefined ? savedCode[currentQ] : (q.starter || '');
    document.getElementById('outputContent').textContent = 'Click "Run" to execute your code.';
    document.getElementById('outputContent').className = 'output-content';
    document.getElementById('outputStatus').textContent = '';
  } else {
    editorArea.style.display = 'none';
    nonCodePanel.style.display = 'flex';
    renderNonCodeFields(q);
  }
}

function renderNonCodeFields(q) {
  const panel = document.getElementById('nonCodePanel');
  let html = '<div class="non-code-answer">';
  q.fields.forEach(f => {
    html += `<label>${f.label}</label>`;
    html += `<input type="text" id="field-${f.key}" placeholder="${f.placeholder || ''}" value="${savedCode[currentQ + '-' + f.key] || ''}">`;
  });
  html += `<button class="btn btn-check" onclick="checkNonCode()">Check Answer</button>`;
  html += `<div class="feedback-msg" id="nonCodeFeedback"></div>`;
  html += '</div>';
  panel.innerHTML = html;
}

function checkNonCode() {
  const q = QUESTIONS[currentQ];
  const answers = {};
  q.fields.forEach(f => {
    const el = document.getElementById('field-' + f.key);
    answers[f.key] = el ? el.value.trim() : '';
    savedCode[currentQ + '-' + f.key] = answers[f.key];
  });

  const fb = document.getElementById('nonCodeFeedback');
  if (q.validator(answers)) {
    fb.className = 'feedback-msg correct';
    fb.textContent = 'Correct! Well done.';
    markSolved(currentQ);
  } else {
    fb.className = 'feedback-msg incorrect';
    if (!failCounts[currentQ]) failCounts[currentQ] = 0;
    failCounts[currentQ]++;
    if (failCounts[currentQ] >= 2) {
      fb.textContent = 'Not quite right. Check the hint below for guidance.';
      showHint();
    } else {
      fb.textContent = 'Not quite right. Try again!';
    }
  }
}

function showHint() {
  const q = QUESTIONS[currentQ];
  if (q.hint) {
    const hintBox = document.getElementById('hintBox');
    hintBox.textContent = 'Hint: ' + q.hint;
    hintBox.style.display = 'block';
  }
}

function markSolved(idx) {
  solved.add(idx);
  const dot = document.getElementById('dot-' + idx);
  if (dot) dot.className = 'dot solved';
  const panel = document.getElementById('questionPanel');
  panel.className = 'question-panel solved';
  updateProgress();
}

function updateProgress() {
  const pct = (solved.size / QUESTIONS.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${solved.size} / ${QUESTIONS.length} solved`;
}

function resetCode() {
  const q = QUESTIONS[currentQ];
  if (q.type === 'code') {
    document.getElementById('codeEditor').value = q.starter || '';
    savedCode[currentQ] = q.starter || '';
    document.getElementById('outputContent').textContent = 'Code reset. Click "Run" to execute.';
    document.getElementById('outputContent').className = 'output-content';
    document.getElementById('outputStatus').textContent = '';
  }
}

async function runCode() {
  const q = QUESTIONS[currentQ];
  if (q.type !== 'code') return;

  const code = document.getElementById('codeEditor').value;
  savedCode[currentQ] = code;
  const runBtn = document.getElementById('runBtn');
  const outputEl = document.getElementById('outputContent');
  const statusEl = document.getElementById('outputStatus');

  runBtn.disabled = true;
  runBtn.innerHTML = '&#9654; Running...';
  outputEl.textContent = 'Running...';
  outputEl.className = 'output-content';
  statusEl.textContent = '';

  let allPassed = true;
  let lastOutput = '';
  let lastError = '';

  try {
    for (const test of q.tests) {
      const result = await executeTest(code, q, test);
      if (!result.passed) {
        allPassed = false;
        lastOutput = result.output;
        lastError = result.error;
        break;
      }
      lastOutput = result.output;
    }

    if (allPassed) {
      outputEl.textContent = lastOutput + '\n\n--- All tests passed! ---';
      outputEl.className = 'output-content success';
      statusEl.textContent = 'PASSED';
      statusEl.style.color = 'var(--green)';
      markSolved(currentQ);
    } else {
      if (!failCounts[currentQ]) failCounts[currentQ] = 0;
      failCounts[currentQ]++;
      if (lastError) {
        outputEl.textContent = 'Error:\n' + lastError;
      } else {
        outputEl.textContent = lastOutput + '\n\n--- Output does not match expected result. Try again! ---';
      }
      outputEl.className = 'output-content error';
      statusEl.textContent = 'NOT PASSED';
      statusEl.style.color = 'var(--accent)';
      if (failCounts[currentQ] >= 3) {
        showHint();
      }
    }
  } catch (e) {
    outputEl.textContent = 'Error: ' + e.message;
    outputEl.className = 'output-content error';
    statusEl.textContent = 'ERROR';
    statusEl.style.color = 'var(--accent)';
  }

  runBtn.disabled = false;
  runBtn.innerHTML = '&#9654; Run';
}

function handleTab(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const ta = e.target;
    const start = ta.selectionStart;
    const end = ta.selectionEnd;
    ta.value = ta.value.substring(0, start) + '    ' + ta.value.substring(end);
    ta.selectionStart = ta.selectionEnd = start + 4;
  }
}

    buildSidebar();
    renderQuestion();
    document.getElementById('codeEditor').addEventListener('keydown', handleTab);
  } catch (e) {
    loading.innerHTML = `<p style="color:var(--accent)">Failed to load Python environment.<br>${e.message}<br><br>Please refresh the page.</p>`;
  }
}

document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    const q = QUESTIONS[currentQ];
    if (q.type === 'code') runCode();
  }
});
</script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
<script>init();</script>
</body>
